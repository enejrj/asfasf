<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный мир | Динамический фон и донаты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            transition: background-color 1s ease;
        }

        /* Динамический фон */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: all 1s ease;
        }

        /* Летающие объекты */
        .floating-object {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-30px) translateX(20px) rotate(5deg);
            }
            50% {
                transform: translateY(-50px) translateX(-15px) rotate(-5deg);
            }
            75% {
                transform: translateY(-25px) translateX(25px) rotate(3deg);
            }
        }

        /* Контейнер интерфейса */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        /* Карточка локации */
        .location-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .location-title {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #333;
        }

        .location-description {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        .location-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 10px;
            color: white;
            margin-bottom: 20px;
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(240, 147, 251, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        /* Модальное окно для донатов */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }

        .donation-options {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .donation-amount {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .donation-amount:hover, .donation-amount.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }

        .custom-amount {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 4px solid #4caf50;
        }

        .notification.error {
            border-left: 4px solid #f44336;
        }

        /* Счетчик донатов */
        .donation-counter {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .location-title {
                font-size: 1.8em;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="background" id="background"></div>
    <div id="floatingObjects"></div>
    
    <div class="container">
        <div class="location-card" id="locationCard">
            <h1 class="location-title" id="locationTitle">Лесная поляна</h1>
            <p class="location-description" id="locationDescription">Тихая лесная поляна, где поют птицы и шелестят листья</p>
            <div class="location-stats" id="locationStats">
                <div>🌡️ Температура: +22°C</div>
                <div>🌤️ Погода: Солнечно</div>
                <div>🐾 Активность: Спокойная</div>
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="changeLocation(-1)">◀ Предыдущая локация</button>
                <button class="btn btn-primary" onclick="changeLocation(1)">Следующая локация ▶</button>
            </div>
            
            <button class="btn btn-secondary" onclick="openDonationModal()">💝 Поддержать проект</button>
            
            <div class="donation-counter" id="donationCounter">
                <strong>💰 Всего собрано донатов:</strong> <span id="totalDonations">0</span> ₽
            </div>
        </div>
    </div>

    <!-- Модальное окно донатов -->
    <div id="donationModal" class="modal">
        <div class="modal-content">
            <h2>💝 Поддержать проект</h2>
            <p>Выберите сумму доната:</p>
            <div class="donation-options">
                <div class="donation-amount" data-amount="100">100 ₽</div>
                <div class="donation-amount" data-amount="500">500 ₽</div>
                <div class="donation-amount" data-amount="1000">1000 ₽</div>
                <div class="donation-amount" data-amount="5000">5000 ₽</div>
            </div>
            <input type="number" id="customAmount" class="custom-amount" placeholder="Или введите свою сумму (₽)">
            <div class="button-group" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="confirmDonation()">✅ Подтвердить донат</button>
                <button class="btn btn-secondary" onclick="closeDonationModal()">❌ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // Локации с разными стилями
        const locations = [
            {
                name: "🌲 Лесная поляна",
                description: "Тихая лесная поляна, где поют птицы и шелестят листья",
                stats: {
                    temp: "+22°C",
                    weather: "☀️ Солнечно",
                    activity: "🐾 Спокойная"
                },
                bgGradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
                bgColor: "#667eea"
            },
            {
                name: "🏔️ Горная вершина",
                description: "Величественные горы с захватывающими видами и свежим воздухом",
                stats: {
                    temp: "-5°C",
                    weather: "❄️ Снегопад",
                    activity: "⛷️ Активная"
                },
                bgGradient: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
                bgColor: "#f093fb"
            },
            {
                name: "🏖️ Тропический пляж",
                description: "Белый песок, пальмы и ласковое море",
                stats: {
                    temp: "+32°C",
                    weather: "☀️ Жарко",
                    activity: "🏊 Пляжная"
                },
                bgGradient: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
                bgColor: "#4facfe"
            },
            {
                name: "🏙️ Мегаполис",
                description: "Огни большого города, небоскребы и бесконечное движение",
                stats: {
                    temp: "+18°C",
                    weather: "🌃 Ночь",
                    activity: "💼 Деловая"
                },
                bgGradient: "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
                bgColor: "#43e97b"
            },
            {
                name: "🏜️ Пустыня Сахара",
                description: "Бескрайние песчаные дюны и жаркое солнце",
                stats: {
                    temp: "+45°C",
                    weather: "🔥 Зной",
                    activity: "🐫 Караванная"
                },
                bgGradient: "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
                bgColor: "#fa709a"
            },
            {
                name: "🌋 Вулканический остров",
                description: "Действующий вулкан и лавовые реки",
                stats: {
                    temp: "+60°C",
                    weather: "🌋 Извержение",
                    activity: "🔥 Экстремальная"
                },
                bgGradient: "linear-gradient(135deg, #f12711 0%, #f5af19 100%)",
                bgColor: "#f12711"
            }
        ];

        let currentLocationIndex = 0;
        let totalDonations = 0;
        let selectedAmount = null;
        let floatingObjects = [];

        // Создание летающих объектов
        function createFloatingObjects() {
            const container = document.getElementById('floatingObjects');
            container.innerHTML = '';
            
            const objects = ['🍃', '🦋', '✨', '⭐', '🌸', '🍂', '❄️', '🌈', '💫', '🕊️'];
            
            for (let i = 0; i < 30; i++) {
                const obj = document.createElement('div');
                obj.className = 'floating-object';
                obj.innerHTML = objects[Math.floor(Math.random() * objects.length)];
                obj.style.left = Math.random() * 100 + '%';
                obj.style.top = Math.random() * 100 + '%';
                obj.style.fontSize = (Math.random() * 30 + 15) + 'px';
                obj.style.animationDelay = Math.random() * 10 + 's';
                obj.style.animationDuration = (Math.random() * 10 + 8) + 's';
                obj.style.opacity = Math.random() * 0.5 + 0.3;
                container.appendChild(obj);
                floatingObjects.push(obj);
            }
        }

        // Обновление фона
        function updateBackground() {
            const bg = document.getElementById('background');
            const location = locations[currentLocationIndex];
            bg.style.background = location.bgGradient;
            
            // Анимируем летающие объекты под новую локацию
            updateFloatingObjectsForLocation();
        }

        // Обновление летающих объектов в зависимости от локации
        function updateFloatingObjectsForLocation() {
            const container = document.getElementById('floatingObjects');
            const location = locations[currentLocationIndex];
            
            let newObjects = [];
            switch(currentLocationIndex) {
                case 0: // Лес
                    newObjects = ['🍃', '🦋', '🌸', '🐿️', '🍄'];
                    break;
                case 1: // Горы
                    newObjects = ['❄️', '⛰️', '🏔️', '💨', '✨'];
                    break;
                case 2: // Пляж
                    newObjects = ['🌊', '🐠', '🐚', '☀️', '🏄'];
                    break;
                case 3: // Город
                    newObjects = ['🚗', '🏢', '🚕', '🚇', '💼'];
                    break;
                case 4: // Пустыня
                    newObjects = ['🐫', '☀️', '🏜️', '🌵', '💨'];
                    break;
                case 5: // Вулкан
                    newObjects = ['🌋', '🔥', '💨', '⚡', '🌑'];
                    break;
                default:
                    newObjects = ['✨', '⭐', '🌟', '💫', '⚡'];
            }
            
            // Обновляем объекты
            const objects = document.querySelectorAll('.floating-object');
            objects.forEach((obj, index) => {
                obj.innerHTML = newObjects[index % newObjects.length];
            });
        }

        // Обновление интерфейса
        function updateUI() {
            const location = locations[currentLocationIndex];
            
            // Анимация смены карточки
            const card = document.getElementById('locationCard');
            card.style.animation = 'none';
            setTimeout(() => {
                card.style.animation = 'slideIn 0.5s ease';
            }, 10);
            
            // Обновляем содержимое
            document.getElementById('locationTitle').textContent = location.name;
            document.getElementById('locationDescription').textContent = location.description;
            
            const statsHtml = `
                <div>🌡️ Температура: ${location.stats.temp}</div>
                <div>🌤️ Погода: ${location.stats.weather}</div>
                <div>🐾 Активность: ${location.stats.activity}</div>
            `;
            document.getElementById('locationStats').innerHTML = statsHtml;
            
            // Меняем стиль карточки под локацию
            const cardBg = document.querySelector('.location-card');
            cardBg.style.background = 'rgba(255, 255, 255, 0.95)';
            cardBg.style.backdropFilter = 'blur(10px)';
            
            updateBackground();
        }

        // Смена локации
        function changeLocation(direction) {
            currentLocationIndex += direction;
            if (currentLocationIndex < 0) currentLocationIndex = locations.length - 1;
            if (currentLocationIndex >= locations.length) currentLocationIndex = 0;
            updateUI();
            showNotification(`Переход в локацию: ${locations[currentLocationIndex].name}`, 'success');
        }

        // Показать уведомление
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <span>${message}</span>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Открыть модальное окно донатов
        function openDonationModal() {
            const modal = document.getElementById('donationModal');
            modal.style.display = 'flex';
            
            // Добавляем обработчики для кнопок выбора суммы
            const amountButtons = document.querySelectorAll('.donation-amount');
            amountButtons.forEach(btn => {
                btn.onclick = () => {
                    amountButtons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedAmount = parseInt(btn.getAttribute('data-amount'));
                    document.getElementById('customAmount').value = '';
                };
            });
        }

        // Закрыть модальное окно
        function closeDonationModal() {
            const modal = document.getElementById('donationModal');
            modal.style.display = 'none';
            selectedAmount = null;
            document.querySelectorAll('.donation-amount').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('customAmount').value = '';
        }

        // Подтверждение доната
        function confirmDonation() {
            let amount = selectedAmount;
            const customAmount = parseInt(document.getElementById('customAmount').value);
            
            if (customAmount && customAmount > 0) {
                amount = customAmount;
            }
            
            if (!amount || amount <= 0) {
                showNotification('Пожалуйста, выберите или введите сумму доната', 'error');
                return;
            }
            
            // Показываем подтверждение
            const confirmed = confirm(`Вы уверены, что хотите пожертвовать ${amount} ₽?`);
            
            if (confirmed) {
                // Добавляем сумму к общему счету
                totalDonations += amount;
                document.getElementById('totalDonations').textContent = totalDonations;
                
                // Показываем анимацию благодарности
                showNotification(`💝 Спасибо за донат в размере ${amount} ₽! Ваша поддержка очень важна для нас!`, 'success');
                
                // Дополнительная анимация
                createDonationEffect();
                
                // Закрываем модальное окно
                closeDonationModal();
                
                // Сохраняем в localStorage
                localStorage.setItem('totalDonations', totalDonations);
            }
        }

        // Эффект при донате
        function createDonationEffect() {
            const hearts = ['❤️', '💝', '💖', '💗', '💓', '💕'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.bottom = '0px';
                heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '9999';
                heart.style.animation = 'float 1s ease-out forwards';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 1000);
            }
        }

        // Загрузка сохраненных донатов
        function loadSavedDonations() {
            const saved = localStorage.getItem('totalDonations');
            if (saved) {
                totalDonations = parseInt(saved);
                document.getElementById('totalDonations').textContent = totalDonations;
            }
        }

        // Добавляем CSS для анимации сердечек
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(-100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Инициализация
        createFloatingObjects();
        loadSavedDonations();
        updateUI();
        
        // Закрытие модального окна по клику вне его
        window.onclick = function(event) {
            const modal = document.getElementById('donationModal');
            if (event.target === modal) {
                closeDonationModal();
            }
        }
        
        // Добавляем эффект параллакса для фона
        document.addEventListener('mousemove', (e) => {
            const objects = document.querySelectorAll('.floating-object');
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            objects.forEach((obj, index) => {
                const speed = 20 + index * 2;
                const x = (mouseX - 0.5) * speed;
                const y = (mouseY - 0.5) * speed;
                obj.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
