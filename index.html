<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СЕКРЕТАРША | TON/SEDLAY ДОНАТЫ | ЛОКАЦИИ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            background: #0a0a0f;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: all 1s ease;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
        }

        .floating-object {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            font-size: 28px;
            opacity: 0.3;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            25% { transform: translateY(-50px) translateX(30px) rotate(5deg); }
            50% { transform: translateY(-80px) translateX(-20px) rotate(-5deg); }
            75% { transform: translateY(-40px) translateX(40px) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-card {
            max-width: 750px;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        /* Секретарша */
        .secretary-section {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            animation: borderPulse 2s infinite;
            cursor: pointer;
        }

        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(255, 8, 68, 0); }
        }

        .secretary-avatar { font-size: 65px; display: inline-block; filter: drop-shadow(0 0 10px rgba(0,0,0,0.3)); }
        .secretary-quote { font-size: 1.2em; font-weight: bold; margin-top: 12px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* Баланс */
        .balance-section {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .balance-row {
            display: flex;
            justify-content: space-between;
            color: #fff;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .balance-row:last-child { border-bottom: none; }
        .balance-value { font-weight: bold; color: #ffd700; font-size: 1.3em; }

        /* Таймер */
        .timer-section {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .timer-title { color: #ffd700; font-size: 0.9em; letter-spacing: 2px; }
        .timer-value { font-size: 2.2em; font-weight: bold; color: #fff; font-family: monospace; }

        /* Миссии */
        .missions-section { margin-bottom: 20px; }
        .missions-section h3 { color: white; margin-bottom: 12px; font-size: 1.1em; }

        .mission-item {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .mission-info { flex: 1; }
        .mission-name { color: #ffd700; font-weight: bold; }
        .mission-reward { font-size: 11px; color: #aaa; margin-top: 3px; }
        .mission-progress {
            width: 120px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .mission-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%;
            transition: width 0.3s;
        }
        .mission-btn {
            background: linear-gradient(135deg, #ff0844, #ffb199);
            border: none;
            padding: 8px 18px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .mission-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* Стакающиеся донаты */
        .donations-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 12px;
        }
        .donations-list h3 { color: white; margin-bottom: 10px; font-size: 1em; }

        .donation-item {
            background: linear-gradient(90deg, rgba(255,8,68,0.25), rgba(255,177,153,0.05));
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 12px;
            color: white;
            font-size: 13px;
            animation: fadeIn 0.3s;
            display: flex;
            justify-content: space-between;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .donation-stack { font-weight: bold; color: #ffd700; }

        /* Локации - ТВОИ */
        .locations-section { margin-bottom: 20px; }
        .locations-section h3 { color: white; margin-bottom: 12px; }

        .location-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .location-item.unlocked { 
            background: linear-gradient(90deg, rgba(0,255,100,0.2), rgba(0,255,100,0.05));
            border-left: 3px solid #00ff66;
            cursor: pointer;
        }
        .location-item.unlocked:hover { transform: translateX(5px); background: rgba(0,255,100,0.25); }
        .location-item.locked { opacity: 0.6; }
        .location-name { font-weight: bold; color: #fff; }
        .location-need { font-size: 11px; color: #ffd700; margin-top: 3px; }
        .location-btn {
            background: linear-gradient(135deg, #ff0844, #ffb199);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .location-btn-teleport {
            background: linear-gradient(135deg, #00cc88, #008855);
        }

        /* Кнопки доната */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            font-size: 16px;
        }
        .btn-ton { background: linear-gradient(135deg, #0088cc, #0055aa); color: white; }
        .btn-sedlay { background: linear-gradient(135deg, #00cc88, #008855); color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0f0f1a;
            border-radius: 30px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-content h2 { color: white; margin-bottom: 20px; text-align: center; }
        .crypto-option {
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            color: white;
            transition: 0.2s;
        }
        .crypto-option:hover { background: rgba(255,255,255,0.15); }
        .crypto-option.selected { background: linear-gradient(135deg, #ff0844, #ffb199); }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #ff0844;
            padding: 14px 22px;
            border-radius: 12px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s;
            font-weight: bold;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: #ff0844; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="background" id="background"></div>
    <div id="floatingObjects"></div>

    <div class="container">
        <div class="main-card">
            <!-- Секретарша -->
            <div class="secretary-section" onclick="updateSecretaryQuote()">
                <div class="secretary-avatar">💋👄🔥</div>
                <div class="secretary-quote" id="secretaryQuote">Ну чё, лох, донатить будешь или так и будешь на халяву сидеть?</div>
            </div>

            <!-- Баланс -->
            <div class="balance-section">
                <div class="balance-row"><span>💎 TON (USDT)</span><span class="balance-value" id="tonBalance">0</span></div>
                <div class="balance-row"><span>💎 SEDLAY (USDT)</span><span class="balance-value" id="sedlayBalance">0</span></div>
                <div class="balance-row"><span>💰 ВСЕГО USDT</span><span class="balance-value" id="totalBalance">0</span></div>
            </div>

            <!-- Таймер -->
            <div class="timer-section">
                <div class="timer-title">⏰ ДО СЛЕДУЮЩИХ МИССИЙ</div>
                <div class="timer-value" id="timerValue">05:00</div>
            </div>

            <!-- Миссии -->
            <div class="missions-section">
                <h3>🎯 АКТИВНЫЕ МИССИИ</h3>
                <div id="missionsList"></div>
            </div>

            <!-- Стакающиеся донаты -->
            <div class="donations-list">
                <h3>💸 ПОСЛЕДНИЕ ДОНАТЫ (СТАКАЮТСЯ)</h3>
                <div id="donationsStack"></div>
            </div>

            <!-- ТВОИ ЛОКАЦИИ -->
            <div class="locations-section">
                <h3>🗺️ ЛОКАЦИИ (ОТКРЫВАЮТСЯ ПО АЛМАЗАМ)</h3>
                <div id="locationsList"></div>
            </div>

            <!-- Кнопки доната -->
            <div class="button-group">
                <button class="btn btn-ton" onclick="openDonationModal('TON')">💎 КУПИТЬ TON</button>
                <button class="btn btn-sedlay" onclick="openDonationModal('SEDLAY')">💎 КУПИТЬ SEDLAY</button>
            </div>
        </div>
    </div>

    <!-- Модалка доната -->
    <div id="donationModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">💰 Покупка TON</h2>
            <div id="cryptoOptions"></div>
            <div class="button-group" style="margin-top:20px;">
                <button class="btn btn-ton" onclick="processCryptoPayment()">✅ ОПЛАТИТЬ</button>
                <button class="btn btn-sedlay" onclick="closeDonationModal()">❌ ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== ТВОИ ЛОКАЦИИ (хуйня но твоя) ====================
        const LOCATIONS = [
            { name: "🌲 ЛЕСНАЯ ПОЛЯНА", need: 0, bg: "linear-gradient(135deg, #1a472a, #2d5a3f)", objects: ['🌲','🍃','🦋','🌸','🐿️'] },
            { name: "🌆 НОЧНОЙ МЕГАПОЛИС", need: 10000, bg: "linear-gradient(135deg, #0a0a2a, #1a1a4a)", objects: ['🌃','🏙️','🚗','🚕','💼'] },
            { name: "🚀 КОСМИЧЕСКАЯ СТАНЦИЯ", need: 40000, bg: "linear-gradient(135deg, #0a0a3a, #1a1a5a)", objects: ['🚀','🛸','⭐','🌙','✨'] },
            { name: "🤖 КИБЕРПАНК", need: 120000, bg: "linear-gradient(135deg, #1a0a2a, #2a1a3a)", objects: ['🤖','💻','⚡','🔧','🦾'] },
            { name: "👑 ЗОЛОТОЙ ТРОН", need: 270000, bg: "linear-gradient(135deg, #2a1a0a, #3a2a1a)", objects: ['👑','💎','🏆','✨','🌟'] },
            { name: "✨ ВЛАСТЕЛИН ВСЕЛЕННОЙ", need: 570000, bg: "linear-gradient(135deg, #1a0a1a, #2a1a2a)", objects: ['✨','🌌','⭐','🌀','💫'] }
        ];

        let coins = 50000; // Твои алмазы
        let currentLoc = 0;
        let currentLocationId = 0;

        // Балансы крипты
        let balances = { TON: 0, SEDLAY: 0 };
        let selectedAmount = null;
        let currentDonationCrypto = null;

        // Стакающиеся донаты
        let donationStack = [];

        // Миссии
        let missions = [
            { id: 0, name: "💎 ПЕРВЫЙ ДОНАТ", desc: "Сделай любой донат", required: 1, current: 0, reward: 10, completed: false },
            { id: 1, name: "🔥 TON МАСТЕР", desc: "Купи TON на 50 USDT", required: 50, current: 0, reward: 25, completed: false },
            { id: 2, name: "💀 SEDLAY КОРОЛЬ", desc: "Купи SEDLAY на 100 USDT", required: 100, current: 0, reward: 50, completed: false },
            { id: 3, name: "🚀 КРИПТО КИТ", desc: "Общая сумма донатов 200 USDT", required: 200, current: 0, reward: 100, completed: false },
            { id: 4, name: "👑 ЛЕГЕНДА", desc: "Купи на 500 USDT", required: 500, current: 0, reward: 250, completed: false }
        ];

        let missionTimerSeconds = 300; // 5 минут
        let timerInterval = null;

        // ==================== ВУЛЬГАРНЫЕ ФРАЗЫ ====================
        const vulgarQuotes = [
            "Ну чё, лох, донатить будешь или так и будешь на халяву сидеть?",
            "Эй, нищеброд, твои алмазы кончились, пополняй, пока я добрая!",
            "Чё ты там тыкаешь? Донатни уже, блин, сопляк!",
            "О, смотрите, ещё один бедняк пришёл. Бабла нет — иди работай, пес!",
            "Купи TON, а то сейчас сама к тебе приду и комп сломаю, понял?",
            "Твой кошелёк пустой как башка депутата. Донать давай, быдло!",
            "Слабачок, даже 10 баксов закинуть не можешь? Позорище!",
            "Опа, очередной халявщик. Плати, сука, или вали отсюда нахер!",
            "Хватит дрочить на бесплатное, открой кошелёк и задонать!",
            "Ты чё, самый умный? Локации за спасибо не открываются, плати, давай!"
        ];

        function updateSecretaryQuote() {
            const randomIndex = Math.floor(Math.random() * vulgarQuotes.length);
            document.getElementById('secretaryQuote').textContent = vulgarQuotes[randomIndex];
        }
        setInterval(updateSecretaryQuote, 10000);

        // ==================== ТВОЯ ЛОГИКА ОТКРЫТИЯ ЛОКАЦИЙ ====================
        function checkLocationUnlock() {
            // Определяем максимальную доступную локацию по алмазам
            for(let i = LOCATIONS.length-1; i >= 0; i--) {
                if(coins >= LOCATIONS[i].need) {
                    currentLoc = i;
                    break;
                }
            }
            
            // Открываем локации и даём награды (однократно)
            if(currentLoc >= 1 && !localStorage.getItem('loc1')) { 
                localStorage.setItem('loc1', '1'); 
                addCoins(10000); 
                showNotification("🌆 Открыт НОЧНОЙ МЕГАПОЛИС! +10000 алмазов", "success"); 
            }
            if(currentLoc >= 2 && !localStorage.getItem('loc2')) { 
                localStorage.setItem('loc2', '1'); 
                addCoins(30000); 
                showNotification("🚀 КОСМИЧЕСКАЯ СТАНЦИЯ! +30000 алмазов", "success"); 
            }
            if(currentLoc >= 3 && !localStorage.getItem('loc3')) { 
                localStorage.setItem('loc3', '1'); 
                addCoins(80000); 
                showNotification("🤖 КИБЕРПАНК! +80000 алмазов", "success"); 
            }
            if(currentLoc >= 4 && !localStorage.getItem('loc4')) { 
                localStorage.setItem('loc4', '1'); 
                addCoins(150000); 
                showNotification("👑 ЗОЛОТОЙ ТРОН! +150000 алмазов", "success"); 
            }
            if(currentLoc >= 5 && !localStorage.getItem('loc5')) { 
                localStorage.setItem('loc5', '1'); 
                addCoins(300000); 
                showNotification("✨ ВЛАСТЕЛИН ВСЕЛЕННОЙ! +300000 алмазов", "success"); 
            }
            
            renderLocationsList();
            updateBackgroundByLocation();
        }

        function addCoins(amount) {
            coins += amount;
            updateCoinsDisplay();
            checkLocationUnlock();
        }

        function updateCoinsDisplay() {
            // Показываем алмазы где-то? Добавим в баланс секцию
            const totalUSDT = balances.TON + balances.SEDLAY;
            document.getElementById('totalBalance').innerHTML = `${totalUSDT} (💎 алмазы: ${coins})`;
        }

        // ==================== ФОН И ЛЕТАЮЩИЕ ОБЪЕКТЫ ====================
        function updateBackgroundByLocation() {
            const loc = LOCATIONS[currentLoc];
            if(loc) {
                document.getElementById('background').style.background = loc.bg;
                updateFloatingObjects(loc.objects);
            }
        }

        function updateFloatingObjects(objects) {
            const container = document.getElementById('floatingObjects');
            container.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const obj = document.createElement('div');
                obj.className = 'floating-object';
                obj.innerHTML = objects[Math.floor(Math.random() * objects.length)];
                obj.style.left = Math.random() * 100 + '%';
                obj.style.top = Math.random() * 100 + '%';
                obj.style.fontSize = (Math.random() * 35 + 18) + 'px';
                obj.style.animationDelay = Math.random() * 12 + 's';
                obj.style.animationDuration = (Math.random() * 12 + 8) + 's';
                container.appendChild(obj);
            }
        }

        // ==================== ОТОБРАЖЕНИЕ ЛОКАЦИЙ ====================
        function renderLocationsList() {
            const container = document.getElementById('locationsList');
            if (!container) return;
            container.innerHTML = '';
            
            for (let i = 0; i < LOCATIONS.length; i++) {
                const loc = LOCATIONS[i];
                const isUnlocked = coins >= loc.need;
                const item = document.createElement('div');
                item.className = `location-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                if (isUnlocked) {
                    item.innerHTML = `
                        <div>
                            <div class="location-name">${loc.name}</div>
                            <div class="location-need">💰 need: ${loc.need} алмазов</div>
                        </div>
                        <button class="location-btn location-btn-teleport" onclick="teleportToLocation(${i})">🗺️ ТЕЛЕПОРТ</button>
                    `;
                } else {
                    item.innerHTML = `
                        <div>
                            <div class="location-name">${loc.name}</div>
                            <div class="location-need">🔒 need: ${loc.need} алмазов</div>
                        </div>
                        <button class="location-btn" disabled style="opacity:0.5;">🔒 ЗАКРЫТО</button>
                    `;
                }
                container.appendChild(item);
            }
        }

        function teleportToLocation(index) {
            if (coins >= LOCATIONS[index].need) {
                currentLoc = index;
                updateBackgroundByLocation();
                showNotification(`✨ Телепорт в ${LOCATIONS[index].name}!`, "success");
                updateSecretaryQuote();
            } else {
                showNotification(`❌ Не хватает ${LOCATIONS[index].need - coins} алмазов, лох!`, "error");
            }
        }

        // ==================== КРИПТО БАЛАНС ====================
        function updateBalances() {
            document.getElementById('tonBalance').textContent = balances.TON;
            document.getElementById('sedlayBalance').textContent = balances.SEDLAY;
            const total = balances.TON + balances.SEDLAY;
            document.getElementById('totalBalance').innerHTML = `${total} (💎 алмазы: ${coins})`;
            localStorage.setItem('cryptoBalances', JSON.stringify(balances));
            localStorage.setItem('coins', coins);
        }

        // ==================== СТАКАЮЩИЕСЯ ДОНАТЫ ====================
        function addDonationToStack(username, amount, crypto) {
            const existing = donationStack.find(d => d.name === username && d.crypto === crypto);
            if (existing) {
                existing.amount += amount;
                existing.timestamp = Date.now();
            } else {
                donationStack.unshift({ name: username, amount: amount, crypto: crypto, timestamp: Date.now() });
            }
            if (donationStack.length > 15) donationStack.pop();
            renderDonationStack();
        }

        function renderDonationStack() {
            const container = document.getElementById('donationsStack');
            if (!container) return;
            container.innerHTML = '';
            donationStack.forEach(d => {
                const div = document.createElement('div');
                div.className = 'donation-item';
                div.innerHTML = `<span>👤 ${d.name}</span><span>💎 +${d.amount} ${d.crypto} <span class="donation-stack">(x${d.amount})</span></span>`;
                container.appendChild(div);
            });
            if (donationStack.length === 0) {
                container.innerHTML = '<div style="color:#aaa; text-align:center;">Пока донатов нет, будь первым, падла!</div>';
            }
        }

        // ==================== МИССИИ ====================
        function renderMissions() {
            const container = document.getElementById('missionsList');
            if (!container) return;
            container.innerHTML = '';
            missions.forEach(mission => {
                if (mission.completed) return;
                const percent = Math.min((mission.current / mission.required) * 100, 100);
                const div = document.createElement('div');
                div.className = 'mission-item';
                div.innerHTML = `
                    <div class="mission-info">
                        <div class="mission-name">${mission.name}</div>
                        <div class="mission-reward">🏆 Награда: ${mission.reward} USDT</div>
                        <div class="mission-progress"><div class="mission-progress-bar" style="width: ${percent}%"></div></div>
                        <div style="font-size:10px; color:#aaa;">${mission.current}/${mission.required}</div>
                    </div>
                    ${mission.current >= mission.required ? `<button class="mission-btn" onclick="claimMission(${mission.id})">ЗАБРАТЬ</button>` : ''}
                `;
                container.appendChild(div);
            });
            if (missions.filter(m => !m.completed).length === 0) {
                container.innerHTML = '<div style="color:#ffd700; text-align:center;">🎉 ВСЕ МИССИИ ВЫПОЛНЕНЫ! Жди обновления!</div>';
            }
        }

        function updateMissionProgress(crypto, amount) {
            let totalDonated = 0;
            missions.forEach(m => {
                if (m.completed) return;
                if (m.id === 0 && amount > 0) m.current = 1;
                if (m.id === 1 && crypto === 'TON') m.current += amount;
                if (m.id === 2 && crypto === 'SEDLAY') m.current += amount;
                if (m.id === 3) { totalDonated += amount; m.current = totalDonated; }
                if (m.id === 4) m.current += amount;
            });
            renderMissions();
        }

        function claimMission(missionId) {
            const mission = missions.find(m => m.id === missionId);
            if (mission && mission.current >= mission.required && !mission.completed) {
                mission.completed = true;
                const rewardUSDT = mission.reward;
                balances.TON += rewardUSDT;
                updateBalances();
                showNotification(`✅ Миссия выполнена! +${rewardUSDT} TON (${rewardUSDT} USDT) получи, падла!`, "success");
                renderMissions();
            }
        }

        // ==================== ТАЙМЕР ====================
        function startMissionTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (missionTimerSeconds <= 0) {
                    resetMissions();
                    missionTimerSeconds = 300;
                } else {
                    missionTimerSeconds--;
                    const minutes = Math.floor(missionTimerSeconds / 60);
                    const seconds = missionTimerSeconds % 60;
                    document.getElementById('timerValue').textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }

        function resetMissions() {
            missions.forEach(m => {
                m.current = 0;
                m.completed = false;
            });
            renderMissions();
            showNotification('🔄 НОВЫЕ МИССИИ! Халявщик, давай выполняй!', "success");
            updateSecretaryQuote();
        }

        // ==================== ДОНАТЫ ====================
        function openDonationModal(crypto) {
            currentDonationCrypto = crypto;
            document.getElementById('modalTitle').textContent = `💰 Покупка ${crypto} (1 ${crypto} = 1 USDT)`;
            const optionsContainer = document.getElementById('cryptoOptions');
            optionsContainer.innerHTML = `
                <div class="crypto-option" data-amount="10">💎 10 ${crypto} <span>10 USDT</span></div>
                <div class="crypto-option" data-amount="50">💎 50 ${crypto} <span>50 USDT</span></div>
                <div class="crypto-option" data-amount="100">💎 100 ${crypto} <span>100 USDT</span></div>
                <div class="crypto-option" data-amount="500">💎 500 ${crypto} <span>500 USDT</span></div>
            `;
            document.querySelectorAll('.crypto-option').forEach(opt => {
                opt.onclick = () => {
                    document.querySelectorAll('.crypto-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedAmount = parseInt(opt.getAttribute('data-amount'));
                };
            });
            document.getElementById('donationModal').style.display = 'flex';
        }

        function closeDonationModal() {
            document.getElementById('donationModal').style.display = 'none';
            selectedAmount = null;
        }

        function processCryptoPayment() {
            if (!selectedAmount) {
                showNotification('Выбери сумму, лох!', "error");
                return;
            }
            closeDonationModal();
            balances[currentDonationCrypto] += selectedAmount;
            updateBalances();
            updateMissionProgress(currentDonationCrypto, selectedAmount);
            
            const userName = prompt("Введи свой ник (для отображения в донатах), падла:", "Аноним");
            const finalName = userName ? userName.substring(0, 20) : "Аноним";
            addDonationToStack(finalName, selectedAmount, currentDonationCrypto);
            showNotification(`✅ +${selectedAmount} ${currentDonationCrypto} (${selectedAmount} USDT) получи, падла!`, "success");
        }

        function showNotification(msg, type) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // ==================== ЗАГРУЗКА ДАННЫХ ====================
        function loadGameData() {
            const savedBalances = localStorage.getItem('cryptoBalances');
            if (savedBalances) balances = JSON.parse(savedBalances);
            const savedCoins = localStorage.getItem('coins');
            if (savedCoins) coins = parseInt(savedCoins);
            
            // Проверяем открытые локации по localStorage
            if(localStorage.getItem('loc1')) { if(coins < 10000) coins = 10000; }
            if(localStorage.getItem('loc2')) { if(coins < 40000) coins = 40000; }
            if(localStorage.getItem('loc3')) { if(coins < 120000) coins = 120000; }
            if(localStorage.getItem('loc4')) { if(coins < 270000) coins = 270000; }
            if(localStorage.getItem('loc5')) { if(coins < 570000) coins = 570000; }
            
            checkLocationUnlock();
            updateBalances();
            renderMissions();
            renderDonationStack();
            renderLocationsList();
            updateBackgroundByLocation();
            startMissionTimer();
        }

        loadGameData();
        window.onclick = (e) => { if (e.target.classList.contains('modal')) closeDonationModal(); };
    </script>
</body>
</html>
