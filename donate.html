<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💎 NO LIFE, JUST TAP - ОПЛАТА TON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e, #0c1222);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffd700, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .donate-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #ffd966;
        }
        .donate-btn {
            display: block;
            background: linear-gradient(135deg, #f0b429, #d48a1a);
            color: #1a1a2e !important;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
        }
        .donate-btn:active {
            transform: scale(0.97);
        }
        .donate-btn:disabled {
            opacity: 0.5;
            transform: none;
        }
        .back-btn {
            background: #2a3b55;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .loading { color: #ffd700; }
        .pending-payment {
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd966;
            padding: 15px;
            border-radius: 20px;
            margin-top: 15px;
            text-align: center;
        }
        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 10px;
            background: #44aa44;
        }
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd966;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💎 NO LIFE, JUST TAP</h1>
        <p>Оплата через Crypto Pay</p>
    </div>

    <div class="donate-card">
        <div class="mode-badge">💰 CRYPTO PAY API</div>
        <div class="section-title">💎 ВЫБЕРИТЕ СУММУ</div>
        
        <button class="donate-btn" data-ton="0.5" data-boost="x2">
            💎 0.5 TON — x2 на 10 мин
        </button>
        <button class="donate-btn" data-ton="1" data-boost="x3">
            💎 1 TON — x3 на 30 мин
        </button>
        <button class="donate-btn" data-ton="2" data-boost="noenergy">
            ⚡ 2 TON — Без энергии 2 мин
        </button>
        <button class="donate-btn" data-ton="5" data-boost="vip">
            👑 5 TON — VIP x2 НАВСЕГДА
        </button>
        <button class="donate-btn" data-ton="10" data-boost="megaboost">
            💥 10 TON — x5 на 2ч +5000💎
        </button>
        <button class="donate-btn" data-ton="20" data-boost="insta">
            ⚡ 20 TON — +50 силы +10000💎
        </button>
    </div>

    <div class="status" id="statusArea">
        📊 Статус: выберите сумму для оплаты
    </div>

    <div id="pendingPaymentDiv" class="pending-payment" style="display: none;">
        <div>⏳ ОЖИДАНИЕ ОПЛАТЫ</div>
        <div id="pendingInfo"></div>
        <div id="timer" class="timer"></div>
        <button id="cancelPaymentBtn" style="margin-top:10px; background:#ff4444;">❌ ОТМЕНИТЬ</button>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">🏠 ВЕРНУТЬСЯ В ИГРУ</button>
</div>

<script>
    // ========== ВАШ API ТОКЕН ОТ CRYPTO BOT ==========
    // ЗАМЕНИТЕ НА СВОЙ ТОКЕН ИЗ @CryptoBot
    const CRYPTO_PAY_TOKEN = "566599:AAdZJg2Mui9HCJ0MywGDldEu7Zxygy9ifPm";
    
    // ========== КОД НИЖЕ НЕ ТРОГАТЬ ==========
    
    let checkInterval = null;
    let timeLeft = 600; // 10 минут на оплату
    
    function showMessage(msg, type = 'info') {
        const status = document.getElementById('statusArea');
        status.innerHTML = `📊 ${msg}`;
        if (type === 'error') {
            status.style.background = 'rgba(255,68,68,0.3)';
        } else if (type === 'success') {
            status.style.background = 'rgba(68,255,68,0.3)';
        } else {
            status.style.background = 'rgba(0,0,0,0.5)';
        }
    }
    
    // Сохранение бонуса в localStorage
    function saveBonus(ton, boostType) {
        const bonusData = {
            ton: ton,
            boostType: boostType,
            timestamp: Date.now()
        };
        
        let existingBonuses = JSON.parse(localStorage.getItem('donationBonuses') || '[]');
        existingBonuses.push(bonusData);
        localStorage.setItem('donationBonuses', JSON.stringify(existingBonuses));
        
        showMessage(`✅ Бонус за ${ton} TON получен! Вернитесь в игру.`, 'success');
    }
    
    // Создание инвойса через Crypto Pay API
    async function createInvoice(amountTON, boostType) {
        showMessage(`🔄 Создаём счёт на ${amountTON} TON...`, 'info');
        
        try {
            const response = await fetch('https://api.crypt.bot/v2/createInvoice', {
                method: 'POST',
                headers: {
                    'Crypto-Pay-API-Token': CRYPTO_PAY_TOKEN,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    asset: 'TON',
                    amount: amountTON.toString(),
                    description: `Donation ${amountTON} TON - ${boostType}`,
                    paid_btn_name: 'callback',
                    paid_btn_url: window.location.href
                })
            });
            
            const data = await response.json();
            console.log("API ответ:", data);
            
            if (data.ok && data.result) {
                return {
                    success: true,
                    invoiceId: data.result.invoice_id,
                    payUrl: data.result.pay_url
                };
            } else {
                return { success: false, error: data };
            }
        } catch(e) {
            console.error("Ошибка:", e);
            return { success: false, error: e.message };
        }
    }
    
    // Проверка статуса инвойса
    async function checkInvoiceStatus(invoiceId) {
        try {
            const response = await fetch(`https://api.crypt.bot/v2/getInvoices?invoice_ids=${invoiceId}`, {
                headers: { 'Crypto-Pay-API-Token': CRYPTO_PAY_TOKEN }
            });
            const data = await response.json();
            
            if (data.ok && data.result && data.result.length > 0) {
                return data.result[0].status === 'paid';
            }
            return false;
        } catch(e) {
            console.error("Ошибка проверки:", e);
            return false;
        }
    }
    
    // Запуск таймера
    function startTimer(callback) {
        timeLeft = 600;
        const timerElement = document.getElementById('timer');
        
        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                callback();
            } else {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.innerHTML = `⏰ Осталось: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }
        }, 1000);
        
        return timerInterval;
    }
    
    // Основная функция оплаты
    async function processPayment(ton, boost) {
        // Отключаем все кнопки
        document.querySelectorAll('.donate-btn').forEach(btn => {
            btn.disabled = true;
        });
        
        // Создаём инвойс
        const invoice = await createInvoice(ton, boost);
        
        if (!invoice.success) {
            showMessage(`❌ Ошибка: ${JSON.stringify(invoice.error)}`, 'error');
            document.querySelectorAll('.donate-btn').forEach(btn => {
                btn.disabled = false;
            });
            return;
        }
        
        // Сохраняем информацию об ожидаемом платеже
        const pendingData = {
            ton: ton,
            boost: boost,
            invoiceId: invoice.invoiceId,
            timestamp: Date.now()
        };
        localStorage.setItem('pendingPayment', JSON.stringify(pendingData));
        
        // Показываем блок ожидания
        document.getElementById('pendingPaymentDiv').style.display = 'block';
        document.getElementById('pendingInfo').innerHTML = `
            Сумма: ${ton} TON<br>
            Буст: ${boost}<br>
            Статус: ожидание оплаты...
        `;
        
        showMessage(`✅ Счёт создан! Перенаправление на оплату...`, 'success');
        
        // Запускаем таймер
        const timerInterval = startTimer(() => {
            clearInterval(checkInterval);
            localStorage.removeItem('pendingPayment');
            document.getElementById('pendingPaymentDiv').style.display = 'none';
            document.querySelectorAll('.donate-btn').forEach(btn => {
                btn.disabled = false;
            });
            showMessage(`⏰ Время ожидания истекло. Попробуйте снова.`, 'error');
        });
        
        // Запускаем проверку статуса
        let attempts = 0;
        checkInterval = setInterval(async () => {
            attempts++;
            const isPaid = await checkInvoiceStatus(invoice.invoiceId);
            
            if (isPaid) {
                clearInterval(checkInterval);
                clearInterval(timerInterval);
                saveBonus(ton, boost);
                localStorage.removeItem('pendingPayment');
                document.getElementById('pendingPaymentDiv').style.display = 'none';
                document.querySelectorAll('.donate-btn').forEach(btn => {
                    btn.disabled = false;
                });
                showMessage(`✅ Оплата подтверждена! Бонус получен!`, 'success');
            } else if (attempts > 20) { // ~2 минуты проверки
                // Не останавливаем, просто продолжаем
                console.log("Продолжаем проверку...");
            }
        }, 5000); // Проверяем каждые 5 секунд
        
        // Перенаправляем на оплату через 1 секунду
        setTimeout(() => {
            window.location.href = invoice.payUrl;
        }, 1000);
    }
    
    // Проверка ожидаемого платежа при загрузке страницы
    async function checkPendingOnLoad() {
        const pending = localStorage.getItem('pendingPayment');
        if (!pending) return;
        
        const data = JSON.parse(pending);
        
        // Проверяем, не устарел ли платеж (больше 10 минут)
        if (Date.now() - data.timestamp > 600000) {
            localStorage.removeItem('pendingPayment');
            return;
        }
        
        // Показываем блок ожидания
        document.getElementById('pendingPaymentDiv').style.display = 'block';
        document.getElementById('pendingInfo').innerHTML = `
            Сумма: ${data.ton} TON<br>
            Буст: ${data.boost}<br>
            Статус: проверка оплаты...
        `;
        
        showMessage(`🔄 Проверяем статус платежа ${data.ton} TON...`, 'info');
        
        // Запускаем таймер
        const timerInterval = startTimer(() => {
            clearInterval(checkInterval);
            localStorage.removeItem('pendingPayment');
            document.getElementById('pendingPaymentDiv').style.display = 'none';
            showMessage(`⏰ Время ожидания истекло. Попробуйте снова.`, 'error');
        });
        
        // Проверяем статус
        checkInterval = setInterval(async () => {
            const isPaid = await checkInvoiceStatus(data.invoiceId);
            
            if (isPaid) {
                clearInterval(checkInterval);
                clearInterval(timerInterval);
                saveBonus(data.ton, data.boost);
                localStorage.removeItem('pendingPayment');
                document.getElementById('pendingPaymentDiv').style.display = 'none';
                showMessage(`✅ Оплата подтверждена! Бонус получен!`, 'success');
            }
        }, 5000);
    }
    
    // Отмена платежа
    function cancelPayment() {
        if (checkInterval) clearInterval(checkInterval);
        localStorage.removeItem('pendingPayment');
        document.getElementById('pendingPaymentDiv').style.display = 'none';
        document.querySelectorAll('.donate-btn').forEach(btn => {
            btn.disabled = false;
        });
        showMessage(`❌ Оплата отменена`, 'error');
    }
    
    // Назначаем обработчики кнопок
    document.querySelectorAll('.donate-btn').forEach(btn => {
        btn.onclick = () => {
            const ton = parseFloat(btn.dataset.ton);
            const boost = btn.dataset.boost;
            processPayment(ton, boost);
        };
    });
    
    document.getElementById('cancelPaymentBtn').onclick = cancelPayment;
    
    // Запускаем проверку при загрузке
    checkPendingOnLoad();
    showMessage(`✅ Готово! Выберите сумму для оплаты.`, 'info');
</script>
</body>
</html>
