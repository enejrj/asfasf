<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💎 NO LIFE, JUST TAP - ОПЛАТА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e, #0c1222);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffd700, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .donate-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
            text-align: center;
        }
        .donate-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        .donate-btn {
            background: linear-gradient(135deg, #f0b429, #d48a1a);
            border: none;
            padding: 15px 20px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a2e !important;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .donate-btn:active {
            transform: scale(0.97);
        }
        .donate-btn:disabled {
            opacity: 0.5;
            transform: none;
        }
        .back-btn {
            background: #2a3b55;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            border: 1px solid #ffd966;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-30px); visibility: hidden; }
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }
        .test-mode { background: #ff4444; }
        .real-mode { background: #44aa44; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💎 NO LIFE, JUST TAP</h1>
        <p>Пополни счёт и получи бонусы</p>
    </div>

    <div class="donate-card">
        <div class="mode-badge" id="modeBadge">🔧 ЗАГРУЗКА...</div>
        <h2>💰 ДОНАТЫ ЗА TON</h2>
        <div class="donate-buttons" id="donateButtons">
            <button class="donate-btn" data-ton="0.5" data-boost="x2">💎 0.5 TON — x2 на 10 мин</button>
            <button class="donate-btn" data-ton="1" data-boost="x3">💎 1 TON — x3 на 30 мин</button>
            <button class="donate-btn" data-ton="2" data-boost="noenergy">💎 2 TON — Без энергии 2 мин</button>
            <button class="donate-btn" data-ton="5" data-boost="vip">👑 5 TON — VIP x2 НАВСЕГДА</button>
            <button class="donate-btn" data-ton="10" data-boost="megaboost">💥 10 TON — x5 на 2ч +5000💎</button>
            <button class="donate-btn" data-ton="20" data-boost="insta">⚡ 20 TON — +50 силы +10000💎</button>
        </div>
    </div>

    <div class="status" id="statusArea">
        📊 Статус: готов к оплате
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">🏠 ВЕРНУТЬСЯ В ИГРУ</button>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    // РЕЖИМ: true = тестовый (бонус сразу), false = реальный (переход на оплату)
    let TEST_MODE = true;
    
    // Реальный токен Crypto Pay
    const CRYPTO_PAY_TOKEN = "566599:AAdZJg2Mui9HCJ0MywGDldEu7Zxygy9ifPm";
    
    // Показываем режим
    const modeBadge = document.getElementById('modeBadge');
    if (TEST_MODE) {
        modeBadge.className = 'mode-badge test-mode';
        modeBadge.innerHTML = '🧪 ТЕСТОВЫЙ РЕЖИМ (бонус сразу)';
    } else {
        modeBadge.className = 'mode-badge real-mode';
        modeBadge.innerHTML = '💰 РЕАЛЬНЫЙ РЕЖИМ (оплата TON)';
    }
    
    // Функция создания счёта
    async function createInvoice(amountTON, boostType) {
        try {
            const response = await fetch('https://api.crypt.bot/v2/createInvoice', {
                method: 'POST',
                headers: {
                    'Crypto-Pay-API-Token': CRYPTO_PAY_TOKEN,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    asset: 'TON',
                    amount: amountTON,
                    description: `Donation ${amountTON} TON - ${boostType}`
                })
            });
            const data = await response.json();
            console.log("API ответ:", data);
            if (data.ok && data.result) {
                return {
                    success: true,
                    invoiceId: data.result.invoice_id,
                    payUrl: data.result.pay_url
                };
            }
            return { success: false, error: data };
        } catch(e) {
            console.error("Ошибка создания счёта:", e);
            return { success: false, error: e.message };
        }
    }
    
    // Функция проверки оплаты
    async function checkInvoice(invoiceId) {
        try {
            const response = await fetch(`https://api.crypt.bot/v2/getInvoices?invoice_ids=${invoiceId}`, {
                headers: { 'Crypto-Pay-API-Token': CRYPTO_PAY_TOKEN }
            });
            const data = await response.json();
            if (data.ok && data.result && data.result.length > 0) {
                return data.result[0].status === 'paid';
            }
            return false;
        } catch(e) {
            console.error("Ошибка проверки:", e);
            return false;
        }
    }
    
    // Функция показа уведомления
    function showMessage(msg, isError = false) {
        const status = document.getElementById('statusArea');
        status.innerHTML = `📊 ${msg}`;
        status.style.background = isError ? 'rgba(255,68,68,0.3)' : 'rgba(0,0,0,0.5)';
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.background = isError ? '#4a1a2a' : '#1a2a4a';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Функция выдачи бонуса (сохраняем в localStorage для основной игры)
    function saveBonus(ton, boostType) {
        const bonusData = {
            ton: ton,
            boostType: boostType,
            timestamp: Date.now()
        };
        
        let existingBonuses = JSON.parse(localStorage.getItem('donationBonuses') || '[]');
        existingBonuses.push(bonusData);
        localStorage.setItem('donationBonuses', JSON.stringify(existingBonuses));
        
        showMessage(`✅ Бонус за ${ton} TON сохранён! Вернитесь в игру.`, false);
    }
    
    // Обработка доната
    async function processDonation(ton, boost) {
        const btn = event.target;
        btn.disabled = true;
        const originalText = btn.innerText;
        btn.innerText = "⏳ ОБРАБОТКА...";
        
        if (TEST_MODE) {
            // Тестовый режим - сразу сохраняем бонус
            showMessage(`🧪 ТЕСТОВЫЙ РЕЖИМ: +${ton} TON (${boost})`, false);
            setTimeout(() => {
                saveBonus(ton, boost);
                showMessage(`✅ Бонус за ${ton} TON сохранён! Вернитесь в игру.`, false);
                btn.disabled = false;
                btn.innerText = originalText;
            }, 500);
        } else {
            // Реальный режим - создаём счёт и переходим
            showMessage(`🔄 Создаём счёт на ${ton} TON...`, false);
            
            try {
                const invoice = await createInvoice(ton, boost);
                
                if (invoice.success && invoice.payUrl) {
                    showMessage(`✅ Счёт создан! Перенаправление на оплату...`, false);
                    
                    // Сохраняем информацию для проверки после возврата
                    localStorage.setItem('pendingPayment', JSON.stringify({
                        ton: ton,
                        boost: boost,
                        invoiceId: invoice.invoiceId,
                        timestamp: Date.now()
                    }));
                    
                    // ПРЯМОЕ ПЕРЕНАПРАВЛЕНИЕ НА ОПЛАТУ
                    setTimeout(() => {
                        window.location.href = invoice.payUrl;
                    }, 1000);
                    
                } else {
                    showMessage(`❌ Ошибка: ${JSON.stringify(invoice.error)}`, true);
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch(e) {
                showMessage(`❌ Ошибка: ${e.message}`, true);
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    }
    
    // Проверка ожидаемого платежа при загрузке страницы
    async function checkPendingPayment() {
        const pending = localStorage.getItem('pendingPayment');
        if (pending && !TEST_MODE) {
            const data = JSON.parse(pending);
            if (Date.now() - data.timestamp < 600000) {
                showMessage(`💰 Проверяем статус платежа ${data.ton} TON...`, false);
                
                const checkInterval = setInterval(async () => {
                    try {
                        const isPaid = await checkInvoice(data.invoiceId);
                        if (isPaid) {
                            clearInterval(checkInterval);
                            saveBonus(data.ton, data.boost);
                            localStorage.removeItem('pendingPayment');
                            showMessage(`✅ Донат ${data.ton} TON подтверждён!`, false);
                        }
                    } catch(e) {
                        console.error("Check error:", e);
                    }
                }, 3000);
                
                setTimeout(() => clearInterval(checkInterval), 300000);
            } else {
                localStorage.removeItem('pendingPayment');
            }
        }
    }
    
    // Назначаем обработчики кнопок
    document.querySelectorAll('.donate-btn').forEach(btn => {
        btn.onclick = async () => {
            const ton = parseFloat(btn.dataset.ton);
            const boost = btn.dataset.boost;
            await processDonation(ton, boost);
        };
    });
    
    // Запускаем проверку
    checkPendingPayment();
    showMessage(`✅ Готово! ${TEST_MODE ? 'Тестовый режим' : 'Режим реальной оплаты'}`, false);
</script>
</body>
</html>
